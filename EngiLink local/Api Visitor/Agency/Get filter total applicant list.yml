info:
  name: Get filter total applicant list
  type: http
  seq: 2

http:
  method: GET
  url: "{{url}}/agency/filter-total-list?id&corporateName&status=0&category"
  headers:
    - name: Jil-Public-Key
      value: "{{Jil-Public-Key}}"
    - name: Jil_Token
      value: "{{Jil_Token}}"
  params:
    - name: id
      value: ""
      type: query
    - name: corporateName
      value: ""
      type: query
    - name: status
      value: "0"
      type: query
    - name: category
      value: ""
      type: query
  body:
    type: multipart-form
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
