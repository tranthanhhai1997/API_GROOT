info:
  name: Add new agency
  type: http
  seq: 7

http:
  method: POST
  url: "{{url}}/agency/create"
  body:
    type: multipart-form
    data:
      - name: corporateName
        type: text
        value: ' "Công ty TNHH ABC Việt Nam",'
        description: require
      - name: displayName
        type: text
        value: ' "ABC Agency",'
        description: require
      - name: phoneNumber
        type: text
        value: ' "0912345678",'
        description: require
      - name: emailAddress
        type: text
        value: ' "contact@abcagency.vn",'
        description: require
      - name: location
        type: text
        value: ' "Quận 1, TP. Hồ Chí Minh",'
        description: "3 value: male, female, no answer"
      - name: contractStartDate
        type: text
        value: ' "2026-01-15",'
      - name: contractNote
        type: text
        value: ' "Hợp đồng chính thức từ 01/2026, phí giới thiệu 18%",'
      - name: internalNote
        type: text
        value: ' "Đối tác tiềm năng cao, đã làm việc với 3 ứng viên thành công",'
      - name: classification
        type: text
        value: ' "general",'
      - name: status
        type: text
        value: " true"
      - name: password
        type: text
        value: abc123456
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
